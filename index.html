<!DOCTYPE html>
<html>
<head>
    <title>Asesoría Sebastián</title>
    <style>
        body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .btn { width: 100px; height: 100px; border-radius: 50%; background: #7c4dff; border: none; cursor: pointer; font-size: 30px; }
    </style>
</head>
<body>
    <h1>Hablá con Sebastián</h1>
    <button id="vapi-btn" class="btn" onclick="toggleCall()">▶️</button>

    <script src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/index.js"></script>
    <script>
      const vapi = new Vapi('TU_PUBLIC_KEY_AQUI'); // Poné la Key de tu captura c2737b
      let active = false;
      function toggleCall() {
        if (!active) { vapi.start('ID_DE_SEBASTIAN'); active = true; document.getElementById('vapi-btn').innerText = '⏹️'; }
        else { vapi.stop(); active = false; document.getElementById('vapi-btn').innerText = '▶️'; }
      }
    </script>
</body>
</html>
